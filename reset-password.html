<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password · Lashmama™</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Georgia, serif;
      background: #FFFCF7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #FFFFFF;
      border: 1px solid #E8D5B0;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .eyebrow {
      font-size: 10px;
      font-weight: 700;
      color: #B8935A;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 32px;
      font-weight: 400;
      color: #2A2218;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .rule {
      width: 32px;
      height: 1px;
      background: #B8935A;
      margin: 16px auto;
    }
    p {
      font-size: 15px;
      color: #7A6B55;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #C9A871, #B8935A);
      color: #FFFFFF;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 16px 40px;
      border-radius: 50px;
      margin-bottom: 24px;
      cursor: pointer;
      border: none;
      font-family: Georgia, serif;
    }
    .fallback {
      font-size: 12px;
      color: #A69B8A;
      line-height: 1.6;
    }
    .fallback a {
      color: #B8935A;
      text-decoration: none;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #E8D5B0;
      border-top-color: #B8935A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #auto { color: #A69B8A; font-size: 13px; margin-bottom: 24px; }
  </style>
</head>
<body>
  <div class="card">
    <p class="eyebrow">Lashmama™</p>
    <h1>Reset Password</h1>
    <div class="rule"></div>

    <div id="loading">
      <div class="spinner"></div>
      <p id="auto">Opening Lashmama™ app…</p>
    </div>

    <div id="manual" style="display:none;">
      <p>Tap the button below to open the Lashmama™ app and reset your password.</p>
      <a href="#" class="btn" id="openBtn">Open App</a>
      <p class="fallback">
        Don't have the app?<br>
        <a href="https://apps.apple.com/au/app/lashmama/id123456789">Download on the App Store</a>
      </p>
    </div>
  </div>

  <script>
    // Extract the full query string and hash from the current URL
    // Supabase appends token params — pass them through to the app
    const params = window.location.search + window.location.hash;
    const deepLink = "lashmama://reset-password" + params;

    document.getElementById("openBtn").href = deepLink;

    // Auto-attempt to open the app
    let opened = false;
    const timeout = setTimeout(() => {
      if (!opened) {
        document.getElementById("loading").style.display = "none";
        document.getElementById("manual").style.display = "block";
      }
    }, 2500);

    // Try to open the app immediately
    window.location.href = deepLink;

    // If we're still here after a moment, show manual button
    window.addEventListener("blur", () => {
      opened = true;
      clearTimeout(timeout);
    });
  </script>
</body>
</html>
